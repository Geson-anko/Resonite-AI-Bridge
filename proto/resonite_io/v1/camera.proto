// Camera service: ユーザー画面相当の映像を server-streaming で配信する。
//
// `StreamFrames` は要求された解像度の BGRA8 raw フレームを連続送信する。
// 座標規約は ResoniteIO 全体の固定 API: row 0 = top-left, BGRA byte order。
// `flip_y` のような向き指定フィールドはあえて持たず、サーバ側で常に top-down に
// 正規化して送る (下流コードでの mental cost を減らすため)。
//
// pixels サイズ上限は proto レベルでは設けず、Channel 設定 (max message size) を
// 緩めることで運用する。4K (4096*4096*4 = 64MB) のような巨大フレームは
// ユーザー責任で要求する想定。
syntax = "proto3";

package resonite_io.v1;

option csharp_namespace = "ResoniteIO.V1";

// CameraStreamRequest はストリーム開始時に解像度と fps 上限を指定する。
// width/height が 0 以下のときはサーバ既定 (640x480) を使う。
// fps_limit が 0 以下のときは pacing 無し (ベストエフォートのネイティブ fps)。
message CameraStreamRequest {
  int32 width = 1;
  int32 height = 2;
  float fps_limit = 3;
}

// CameraFrameFormat は pixels の byte 配置を識別する。
enum CameraFrameFormat {
  CAMERA_FRAME_FORMAT_UNSPECIFIED = 0;
  // BGRA8: 1 ピクセル 4 byte (B, G, R, A の順)、row 0 = 画像上端 (top-left origin)。
  CAMERA_FRAME_FORMAT_BGRA8 = 1;
}

// CameraFrame は 1 フレーム分の raw pixel と metadata。
// pixels の長さは必ず width * height * 4 (BGRA8 時)。
message CameraFrame {
  int32 width = 1;
  int32 height = 2;
  CameraFrameFormat format = 3;
  int64 unix_nanos = 4;
  int64 frame_id = 5;
  bytes pixels = 6;
}

// Camera は映像モダリティの中心サービス。
service Camera {
  rpc StreamFrames(CameraStreamRequest) returns (stream CameraFrame);
}
