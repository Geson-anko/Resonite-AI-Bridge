# Docker Compose 開発環境定義。
#
# - `name: resonite-io-${USER}` でプロジェクト・コンテナ・volume を ${USER}
#   名前空間化し、同一ホストで複数ユーザーが衝突せず共存できるようにする。
# - host repo を `/workspace` に rw bind する。dev ユーザーの UID/GID を host と
#   一致させているため、container 内で生成した成果物は host から所有権そのまま見える。
# - host 側 ${ResonitePath} (Resonite 実行ディレクトリ) を ro bind するのは
#   FrooxEngine.dll 等の HintPath 参照用 (csproj が `/resonite` を見に行く)。
#   コンテナ内では `environment: ResonitePath: /resonite` で上書きする。
# - mod の deploy 先は `/workspace/gale` (= host repo 直下の Gale プロファイル)。
#   コンテナ内では `environment: GalePath: /workspace/gale` で csproj が deploy 先を解決。
# - ${HOST_UID} / ${HOST_GID} は justfile の container-* レシピが
#   `id -u` / `id -g` から動的に注入する。.env には書かない。
# - 本番 gRPC UDS の socket dir は host の `${HOME}/.resonite-io/`。pressure-vessel
#   は host の `/home/$USER` を sandbox に bind-mount するため Resonite 上の mod
#   からも同じパスで書き込める。container 側では username が異なる
#   (host=任意 / container=`dev`) ので `/home/dev/.resonite-io/` に bind する
#   ことで、3 つの mount namespace (host / pressure-vessel / container) が
#   同じ inode に到達できるようにする。
#   host 側ディレクトリは `just container-up` が 0700 で先に作成する
#   (Docker 任せだと root 所有で作られ、mod が bind できなくなる)。
# - `${HOST_HOME}/.resonite-io-debug` も同様に rw bind する。こちらは
#   container 内 `scripts/resonite_cli.py` から host 常駐の `scripts/host_agent.py`
#   を叩く debug bridge 専用 UDS (`host-agent.sock`)。本番 gRPC IPC とは
#   ディレクトリ単位で分離し、mod 側の socket 探索が誤って拾わないようにする。
# - host 側 path は `${HOST_HOME}` を justfile が `echo $HOME` から動的に注入。
#   .env で固定しない (利用者ごとに異なるため)。

name: resonite-io-${USER}

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${HOST_UID}
        USER_GID: ${HOST_GID}
    image: resonite-io-dev:${USER}
    container_name: resonite-io-dev-${USER}
    hostname: resonite-io-dev
    working_dir: /workspace
    command: ["sleep", "infinity"]
    env_file: .env
    environment:
      ResonitePath: /resonite
      GalePath: /workspace/gale
    init: true
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - ${ResonitePath}:/resonite:ro
      # 本番 gRPC UDS 共有: host の Resonite mod が `$HOME/.resonite-io/` に作る
      # socket を container 内の Python `~/.resonite-io/` から connect する。
      # host=任意ユーザー / container=`dev` で username が異なるため、同じ
      # 物理ディレクトリを container 内では `/home/dev/.resonite-io/` に bind
      # することで、双方の `Path.home()` / `$HOME` 解決が同じ inode を指す。
      # host 側ディレクトリは justfile container-up が事前に 0700 で作成する
      # (Docker 任せだと root 所有で生成される)。create_host_path: false で
      # 未作成時に fail-fast。
      - type: bind
        source: ${HOST_HOME}/.resonite-io
        target: /home/dev/.resonite-io
        bind:
          create_host_path: false
      # Debug bridge UDS 共有: container 内 scripts/resonite_cli.py が host 常駐の
      # scripts/host_agent.py を叩く debug 専用 socket dir。本番 IPC とは別 dir。
      - type: bind
        source: ${HOST_HOME}/.resonite-io-debug
        target: /home/dev/.resonite-io-debug
        bind:
          create_host_path: false
      # NuGet / uv の既定キャッシュパスにマウントするため、コンテナ側で追加 ENV は不要。
      - cache-nuget:/home/dev/.nuget
      - cache-uv:/home/dev/.cache/uv
      - cache-claude:/home/dev/.claude

volumes:
  cache-nuget:
    name: resonite-io-cache-nuget-${USER}
  cache-uv:
    name: resonite-io-cache-uv-${USER}
  cache-claude:
    name: resonite-io-cache-claude-${USER}
